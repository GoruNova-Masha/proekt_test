<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генерация идей для постов</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      max-width: 36rem;
      margin: 2rem auto;
      padding: 0 1.25rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    ul {
      margin: 0;
      padding-left: 1.25rem;
    }
    li {
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Генерация идей для постов</h1>
  <ul>
    <li>5 идей постов для экспертов</li>
    <li>3 идеи на сегодня</li>
    <li>Контент план на неделю</li>
  </ul>
</body>
</html>
